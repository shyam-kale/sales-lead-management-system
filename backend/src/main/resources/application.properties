# -----------------------------
# Server Configuration
# -----------------------------
server.port=${PORT:8081}
server.address=0.0.0.0

# -----------------------------
# Database Configuration (MySQL)
# -----------------------------
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/sales_lead_db}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:Root@1234}
spring.datasource.driver-class-name=${DATABASE_DRIVER:com.mysql.cj.jdbc.Driver}

# -----------------------------
# JPA / Hibernate Configuration
# -----------------------------
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=${HIBERNATE_DIALECT:}

# -----------------------------
# Connection Pool Configuration
# -----------------------------
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# -----------------------------
# JSON Configuration
# -----------------------------
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# -----------------------------
# Logging Configuration
# -----------------------------
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.sales=DEBUG
