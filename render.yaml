services:
  - type: web
    name: sales-lead-system
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: singapore
    envVars:
      - key: HIBERNATE_DDL_AUTO
        value: update

databases:
  - name: sales-lead-db
    databaseName: sales_lead_db
    user: sales_user
    plan: free
    region: singapore
