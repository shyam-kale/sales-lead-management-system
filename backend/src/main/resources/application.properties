# -----------------------------
# Server Configuration
# -----------------------------
server.port=${PORT:8081}
server.address=0.0.0.0

# -----------------------------
# Database Configuration
# -----------------------------
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/sales_lead_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.postgresql.Driver}

# -----------------------------
# JPA / Hibernate Configuration
# -----------------------------
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# -----------------------------
# Connection Pool Configuration (Optimized for Render Free Tier)
# -----------------------------
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# -----------------------------
# JSON Configuration
# -----------------------------
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# -----------------------------
# Logging Configuration (Production - Less Verbose)
# -----------------------------
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.com.sales=INFO
logging.level.org.springframework.web=INFO


# -----------------------------
# Performance Optimization
# -----------------------------
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css
