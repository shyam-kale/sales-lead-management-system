services:
  - type: web
    name: sales-lead-system
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: singapore
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sales-lead-db
          property: connectionString
      - key: DATABASE_DRIVER
        value: org.postgresql.Driver
      - key: HIBERNATE_DDL_AUTO
        value: update
      - key: HIBERNATE_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect

databases:
  - name: sales-lead-db
    databaseName: sales_lead_db
    user: sales_user
    plan: free
    region: singapore
