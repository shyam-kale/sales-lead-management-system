services:
  # Web Service (Spring Boot App)
  - type: web
    name: sales-lead-system
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: singapore
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: sales-lead-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: sales-lead-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: sales-lead-db
          property: password
      - key: DATABASE_DRIVER
        value: org.postgresql.Driver
      - key: HIBERNATE_DDL_AUTO
        value: update
      - key: HIBERNATE_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect

databases:
  # PostgreSQL Database (Free)
  - name: sales-lead-db
    databaseName: sales_lead_db
    user: sales_user
    plan: free
    region: singapore
